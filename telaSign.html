<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="estilos/login.css">
<title>Sign Up - SassifyMoz</title>



</head>

<body>

<div class="container">

    <!-- LADO ESQUERDO -->
    <div class="left">
        <h1>Bem-vindo ao SassifyMoz</h1>
        <p>Cria a tua conta e começa a gerir o teu negócio de forma inteligente.</p>

        <img src="https://illustrations.popsy.co/gray/work-from-home.svg" alt="illustration">
    </div>

    <!-- LADO DIREITO -->
    <div class="right">

        <div class="formBox">

            <h2>Criar Conta</h2>

            <input type="text" id="name" placeholder="Nome completo">
            <input type="email" id="email" placeholder="Email corporativo">
            <input type="password" id="password" placeholder="Senha forte">

            <button id="signupBtn">Criar conta</button>

            <p id="msg"></p>

            <span>Já tens conta? <a href="#">Login</a></span>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
